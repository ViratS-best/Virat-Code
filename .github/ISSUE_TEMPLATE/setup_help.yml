name: "🔧 Setup / Installation Help"
description: Having trouble installing or configuring Virat-Code? Ask here.
title: "[Setup]: "
labels: ["setup"]
body:
  - type: markdown
    attributes:
      value: |
        Sorry you're having trouble! Please fill out the details below so we can help.

        **Quick checks first:**
        - Run `virat-code doctor` and include the output below
        - Try `Virat-Code update` to get the latest version
        - Check the [README troubleshooting section](https://github.com/ViratS-best/Virat-Code#troubleshooting)
        - For general questions, consider the [Virat Sisodiya Discord](https://discord.gg/NousResearch) for faster help

  - type: textarea
    id: description
    attributes:
      label: What's Going Wrong?
      description: Describe what you're trying to do and where it fails.
      placeholder: |
        I ran `Virat-Code setup` and selected Nous Portal, but when I try to
        start the gateway I get...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps Taken
      description: What did you do? Include the exact commands you ran.
      placeholder: |
        1. Ran the install script: `curl -fsSL ... | bash`
        2. Ran `Virat-Code setup` and chose "Quick setup"
        3. Selected OpenRouter, entered API key
        4. Ran `virat-code chat` and got error...
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - Install script (curl | bash)
        - Manual clone + pip/uv install
        - PowerShell installer (Windows)
        - Docker
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Ubuntu 24.04 / macOS 15.2 / Windows 11
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version` (or `python3 --version`)
      placeholder: "3.11.9"

  - type: input
    id: virat-code-version
    attributes:
      label: Virat-Code Version
      description: Output of `virat-code version` (if install got that far)
      placeholder: "2.1.0"

  - type: textarea
    id: doctor-output
    attributes:
      label: Output of `virat-code doctor`
      description: Run `virat-code doctor` and paste the full output. This will be auto-formatted.
      render: shell

  - type: textarea
    id: error-output
    attributes:
      label: Full Error Output
      description: Paste the complete error message or traceback. This will be auto-formatted.
      render: shell
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I've Already Tried
      description: List any fixes or workarounds you've already attempted.
      placeholder: |
        - Ran `Virat-Code update`
        - Tried reinstalling with `pip install -e ".[all]"`
        - Checked that OPENROUTER_API_KEY is set in ~/.virat-code/.env
